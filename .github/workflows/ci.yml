name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: svelte-check
        run: bun run check

      - name: Build
        run: bun run build
        # Dummy values — this build only verifies it compiles. The real deploy
        # runs on Netlify with the production env vars.
        env:
          PUBLIC_SUPABASE_URL: https://example.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
