name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    # Dummy values so `svelte-kit sync` emits the $env/static/public exports and
    # the build compiles. This is only a compile check — Netlify does the real
    # deploy with the production env vars.
    env:
      PUBLIC_SUPABASE_URL: https://example.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: svelte-check
        run: bun run check

      - name: Build
        run: bun run build
