# Netlify deploy config for MyOS (static SPA, adapter-static).
# Set PUBLIC_SUPABASE_URL and PUBLIC_SUPABASE_ANON_KEY in the Netlify site UI
# (Site settings → Environment variables) — they are read at build time.

[build]
  command = "bun run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for client-side routes (also in static/_redirects).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
